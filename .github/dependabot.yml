version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

    groups:
      # ESLint ecosystem: core, plugins, parsers, and config packages.
      eslint-ecosystem:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@eslint-react/*"
          - "typescript-eslint"
          - "globals"

      # Wrangler and Cloudflare packages for coordinated upgrades.
      wrangler-ecosystem:
        patterns:
          - "wrangler"
          - "@cloudflare/*"

      # React Router framework packages.
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"

      # React core packages.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      # Firebase packages.
      firebase:
        patterns:
          - "firebase"
          - "firebase-admin"

      # Vitest and testing packages.
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"

  # Worker directories — each has its own package.json.
  - package-ecosystem: "npm"
    directories:
      - "/workers/audit-worker"
      - "/workers/data-worker"
      - "/workers/image-worker"
      - "/workers/lists-worker"
      - "/workers/pdf-worker"
      - "/workers/user-worker"
    schedule:
      interval: "weekly"

    groups:
      wrangler-ecosystem:
        patterns:
          - "wrangler"
          - "@cloudflare/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
